<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>League Schedule</title>
  <link rel="stylesheet" href="./app.css">
</head>
<body>
<header>
  <h1>League Schedule</h1>
  <p>Official league schedule for the season.</p>
</header>

<main>
  <div class="note">Live schedule powered by the league database.</div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Time</th>
          <th>Field</th>
          <th>Matchup</th>
          <th>Status</th>
          <th>Score</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
</main>

<footer>Updated automatically from the league backend.</footer>

<script src="./shared.js"></script>
<script>
async function init() {
  const games = await loadData("Web_Schedule", "../data/schedule.json");
  const rows = document.getElementById("rows");

  rows.innerHTML = games.map(game => `
    <tr>
      <td>${game.display_date || game.game_date || game.date || "-"}</td>
      <td>${game.game_time || game.time || "-"}</td>
      <td><span class="badge">${game.field || "-"}</span></td>
      <td><strong>${game.away_team || "-"}</strong> vs <strong>${game.home_team || "-"}</strong></td>
      <td><span class="badge">${game.status || "Scheduled"}</span></td>
      <td><strong>${(game.home_score ?? "") !== "" && (game.away_score ?? "") !== "" ? `${game.home_score} - ${game.away_score}` : "-"}</strong></td>
    </tr>
  `).join("");
}

init().catch(err => {
  document.getElementById("rows").innerHTML = `<tr><td colspan="6"><strong>Error:</strong> ${err.message}</td></tr>`;
});
</script>
</body>
</html>
