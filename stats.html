<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Player Stats | Baseball For Bums</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,300;0,400;0,600;0,700;0,800;0,900;1,800&family=Barlow:wght@300;400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./app.css?v=5">

  <style>
    :root {
      --bg:        #070c15;
      --surface:   #0d1626;
      --surface2:  #111d30;
      --border:    rgba(255,255,255,0.07);
      --border2:   rgba(255,255,255,0.13);
      --text:      #e8f0ff;
      --muted:     rgba(184,196,218,0.55);
      --accent:    #d64045;
      --accent2:   #ffcc66;
      --teal:      #3ee8d8;
      --green:     #4cdb8a;
      --red:       #ff6b6b;

      --renegades:  #f5c542;
      --see-ya:     #4da3ff;
      --hurricanes: #3ee8d8;
      --elite:      #ff8080;
      --legends:    #c084fc;
      --cut-fresh:  #4cdb8a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.025;
      pointer-events: none;
      z-index: 0;
    }

    /* ── PAGE HEADER ── */
    .page-header {
      position: relative;
      padding: 48px 0 36px;
      overflow: hidden;
    }
    .page-header::before {
      content: "STATS";
      position: absolute;
      top: -10px; right: -20px;
      font-family: 'Oswald', sans-serif;
      font-size: clamp(100px, 18vw, 200px);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: rgba(255,255,255,0.022);
      pointer-events: none;
      user-select: none;
      white-space: nowrap;
    }
    .page-header-inner {
      position: relative;
      z-index: 1;
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
    }
    .page-eyebrow {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .page-eyebrow::before {
      content: "";
      display: inline-block;
      width: 20px; height: 2px;
      background: var(--accent);
      border-radius: 1px;
    }
    .page-title {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(2.8rem, 6vw, 4.5rem);
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 0.92;
      background: linear-gradient(140deg, #ffffff 40%, #aac4ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .page-subtitle {
      margin-top: 10px;
      font-size: 0.88rem;
      color: var(--muted);
    }
    .season-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,204,102,0.3);
      background: rgba(255,204,102,0.07);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent2);
      align-self: flex-start;
    }
    .header-divider {
      height: 1px;
      background: linear-gradient(90deg, var(--accent) 0%, rgba(255,204,102,0.3) 30%, transparent 70%);
      margin-bottom: 36px;
    }

    /* ── PAGE BODY ── */
    .page-body {
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
      padding-bottom: 80px;
      position: relative;
      z-index: 1;
    }

    /* ── SECTION LABEL ── */
    .section-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-label::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ════════════════════════════════
       LEADERBOARD SECTION
    ════════════════════════════════ */
    .leaderboards-section { margin-bottom: 52px; }

    /* Tab strip */
    .lb-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 18px;
    }
    .lb-tab {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 7px 14px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.09);
      background: rgba(255,255,255,0.04);
      color: var(--muted);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.13s ease;
      user-select: none;
      white-space: nowrap;
    }
    .lb-tab:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.18);
      color: var(--text);
    }
    .lb-tab.active {
      background: rgba(214,64,69,0.18);
      border-color: rgba(214,64,69,0.5);
      color: #ffcecf;
      box-shadow: 0 0 0 1px rgba(214,64,69,0.2), 0 4px 14px rgba(214,64,69,0.15);
    }
    .lb-tab-icon { font-size: 0.85rem; }

    /* Leaderboard card */
    .lb-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      display: none;
      animation: slideUp 0.25s ease both;
    }
    .lb-card.active { display: block; }

    .lb-card-header {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 16px;
      padding: 20px 24px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }
    .lb-card-title {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .lb-icon {
      font-size: 1.6rem;
      line-height: 1;
      width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      flex-shrink: 0;
    }
    .lb-card-title h3 {
      font-family: 'Oswald', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.01em;
      line-height: 1.1;
      margin: 0;
    }
    .lb-card-title small {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 500;
      margin-top: 3px;
      font-family: 'Barlow', sans-serif;
    }
    .lb-see-all {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent2);
      background: rgba(255,204,102,0.08);
      border: 1px solid rgba(255,204,102,0.2);
      border-radius: 6px;
      padding: 7px 14px;
      cursor: pointer;
      transition: all 0.13s;
      white-space: nowrap;
    }
    .lb-see-all:hover {
      background: rgba(255,204,102,0.15);
      border-color: rgba(255,204,102,0.4);
    }

    /* LB rows */
    .lb-list {
      list-style: none;
      padding: 10px 16px 14px;
      display: grid;
      gap: 6px;
    }
    .lb-row {
      display: grid;
      grid-template-columns: 36px 1fr auto;
      align-items: center;
      gap: 14px;
      padding: 13px 16px;
      border-radius: 10px;
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.055);
      transition: background 0.13s, border-color 0.13s;
    }
    .lb-row:hover {
      background: rgba(255,255,255,0.05);
      border-color: rgba(255,255,255,0.1);
    }

    /* Gold / silver / bronze */
    .lb-row:nth-child(1) {
      background: rgba(245,197,66,0.07);
      border-color: rgba(245,197,66,0.25);
      border-left: 3px solid #f5c542;
    }
    .lb-row:nth-child(2) {
      background: rgba(176,184,200,0.05);
      border-left: 3px solid #9aaabe;
    }
    .lb-row:nth-child(3) {
      background: rgba(201,123,75,0.05);
      border-left: 3px solid #c97b4b;
    }

    .lb-rank {
      font-family: 'Oswald', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: rgba(184,196,218,0.35);
      text-align: center;
    }
    .lb-row:nth-child(1) .lb-rank { color: #f5c542; font-size: 1.2rem; }
    .lb-row:nth-child(2) .lb-rank { color: #b8c4d4; }
    .lb-row:nth-child(3) .lb-rank { color: #c4845c; }

    .lb-player-info { min-width: 0; }
    .lb-player-name {
      font-family: 'Oswald', sans-serif;
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .lb-player-team {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 2px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .lb-team-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .lb-stat-value {
      font-family: 'Oswald', sans-serif;
      font-size: 1.65rem;
      font-weight: 700;
      color: var(--accent2);
      letter-spacing: -0.01em;
      white-space: nowrap;
    }
    .lb-row:nth-child(1) .lb-stat-value {
      font-size: 1.9rem;
      color: #ffe47a;
      text-shadow: 0 0 20px rgba(255,204,102,0.35);
    }

    /* ════════════════════════════════
       FULL STATS TABLE SECTION
    ════════════════════════════════ */
    .stats-section { margin-bottom: 56px; }

    /* Toolbar */
    .stats-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    /* Search */
    .stats-search {
      position: relative;
      flex: 1;
      min-width: 200px;
      max-width: 340px;
    }
    .stats-search-icon {
      position: absolute;
      left: 16px; top: 50%;
      transform: translateY(-50%);
      color: rgba(184,196,218,0.4);
      font-size: 1rem;
      pointer-events: none;
    }
    .stats-search input {
      width: 100%;
      height: 44px;
      padding: 0 16px 0 42px;
      border-radius: 10px;
      border: 1px solid var(--border2);
      background: var(--surface);
      color: var(--text);
      font: inherit;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.14s, box-shadow 0.14s;
    }
    .stats-search input::placeholder { color: rgba(184,196,218,0.3); }
    .stats-search input:focus {
      border-color: rgba(214,64,69,0.5);
      box-shadow: 0 0 0 3px rgba(214,64,69,0.1);
    }

    /* Sort dropdown */
    .stats-sort-wrap { position: relative; }
    .stats-sort-wrap select {
      appearance: none;
      height: 44px;
      padding: 0 36px 0 16px;
      border-radius: 10px;
      border: 1px solid var(--border2);
      background: var(--surface);
      color: var(--text);
      font: inherit;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.88rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      outline: none;
      cursor: pointer;
      transition: border-color 0.14s;
    }
    .stats-sort-wrap select:focus { border-color: rgba(214,64,69,0.5); }
    .stats-sort-wrap::after {
      content: "▾";
      position: absolute;
      right: 14px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      font-size: 0.72rem;
    }

    /* Player count */
    .stats-count {
      margin-left: auto;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(184,196,218,0.4);
      white-space: nowrap;
    }

    /* Table wrapper */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    }
    .table-scroll { overflow-x: auto; }

    table { width: 100%; border-collapse: collapse; }

    /* Header */
    thead tr {
      background: var(--surface2);
      border-bottom: 1px solid var(--border2);
    }
    thead th {
      padding: 14px 14px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.62rem;
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(184,196,218,0.45);
      text-align: left;
      cursor: pointer;
      white-space: nowrap;
      user-select: none;
      transition: color 0.13s, background 0.13s;
    }
    thead th:hover { color: var(--text); }
    thead th.th-num { text-align: right; }
    thead th.sort-active {
      color: var(--accent2);
      background: rgba(255,204,102,0.06);
    }
    thead th.sort-active::after { content: " ↓"; font-size: 0.68rem; opacity: 0.7; }

    /* Body */
    tbody td {
      padding: 13px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      vertical-align: middle;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: rgba(255,255,255,0.025) !important; }
    tbody tr:nth-child(even) td { background: rgba(255,255,255,0.015); }

    /* Top 3 highlights */
    tbody tr:nth-child(1) td { background: rgba(245,197,66,0.05) !important; }
    tbody tr:nth-child(2) td { background: rgba(176,184,200,0.03) !important; }
    tbody tr:nth-child(3) td { background: rgba(201,123,75,0.04) !important; }

    /* Player cell */
    .td-player {
      display: flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
    }
    .td-player-rank {
      font-family: 'Oswald', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: rgba(184,196,218,0.3);
      width: 22px;
      text-align: right;
      flex-shrink: 0;
    }
    .rank-gold   { color: #f5c542 !important; font-size: 1rem !important; }
    .rank-silver { color: #b8c4d4 !important; font-size: 1rem !important; }
    .rank-bronze { color: #c4845c !important; font-size: 1rem !important; }

    .td-player-name {
      font-family: 'Oswald', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.01em;
    }

    /* Team cell */
    .td-team-cell {
      display: flex;
      align-items: center;
      gap: 7px;
      white-space: nowrap;
    }
    .td-team-bar {
      width: 3px; height: 16px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .td-team-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    /* Number cells */
    .td-num {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.98rem;
      font-weight: 700;
      color: rgba(200,215,238,0.85);
      text-align: right;
    }
    /* Rate stats (AVG, OBP, SLG, OPS) */
    .td-avg {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.98rem;
      font-weight: 900;
      color: var(--accent2);
      text-align: right;
    }

    /* Animations */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .leaderboards-section { animation: slideUp 0.35s ease both 0.05s; }
    .stats-section { animation: slideUp 0.35s ease both 0.12s; }

    /* Responsive */
    @media (max-width: 860px) {
      .table-scroll { overflow-x: auto; }
      table { min-width: 760px; }
    }
    @media (max-width: 640px) {
      .lb-tabs { gap: 5px; }
      .lb-tab { padding: 6px 10px; font-size: 0.75rem; }
      .stats-search { max-width: 100%; flex: 1 1 100%; }
      .stats-count { display: none; }
    }
  </style>
</head>
<body>

<div id="site-header"></div>

<!-- PAGE HEADER -->
<div class="page-header">
  <div class="page-header-inner">
    <div>
      <div class="page-eyebrow">Spring 2026 Season</div>
      <h1 class="page-title">Player Stats</h1>
      <p class="page-subtitle">Full batting statistics · Updated after every game</p>
    </div>
    <div class="season-badge">⚾ 2026 Season</div>
  </div>
</div>
<div class="header-divider"></div>

<div class="page-body">

  <!-- ══ LEADERBOARDS ══ -->
  <section class="leaderboards-section">
    <div class="section-label">Leaderboards</div>

    <div class="lb-tabs" id="lb-tabs">
      <button class="lb-tab active" data-lb="ops">  <span class="lb-tab-icon">📈</span> OPS</button>
      <button class="lb-tab" data-lb="avg">         <span class="lb-tab-icon">🎯</span> AVG</button>
      <button class="lb-tab" data-lb="obp">         <span class="lb-tab-icon">👁️</span> OBP</button>
      <button class="lb-tab" data-lb="slg">         <span class="lb-tab-icon">⚡</span> SLG</button>
      <button class="lb-tab" data-lb="hr">          <span class="lb-tab-icon">💣</span> HR</button>
      <button class="lb-tab" data-lb="1b">          <span class="lb-tab-icon">✅</span> 1B</button>
      <button class="lb-tab" data-lb="2b">          <span class="lb-tab-icon">🔥</span> 2B</button>
      <button class="lb-tab" data-lb="3b">          <span class="lb-tab-icon">⚡</span> 3B</button>
      <button class="lb-tab" data-lb="rbi">         <span class="lb-tab-icon">🏠</span> RBI</button>
      <button class="lb-tab" data-lb="sb">          <span class="lb-tab-icon">💨</span> SB</button>
      <button class="lb-tab" data-lb="h">           <span class="lb-tab-icon">🏏</span> Hits</button>
      <button class="lb-tab" data-lb="ab">          <span class="lb-tab-icon">📋</span> AB</button>
      <button class="lb-tab" data-lb="gp">          <span class="lb-tab-icon">📅</span> GP</button>
    </div>

    <div id="lb-cards"></div>
  </section>

  <!-- ══ FULL STATS TABLE ══ -->
  <section class="stats-section">
    <div class="section-label">Full Stats Table</div>

    <div class="stats-toolbar">
      <div class="stats-search">
        <span class="stats-search-icon" aria-hidden="true">⌕</span>
        <input type="search" id="search" placeholder="Search player or team…" autocomplete="off">
      </div>

      <div class="stats-sort-wrap">
        <select id="sort">
          <option value="ops">Sort: OPS</option>
          <option value="avg">Sort: AVG</option>
          <option value="obp">Sort: OBP</option>
          <option value="slg">Sort: SLG</option>
          <option value="hr">Sort: HR</option>
          <option value="1b">Sort: 1B</option>
          <option value="2b">Sort: 2B</option>
          <option value="3b">Sort: 3B</option>
          <option value="rbi">Sort: RBI</option>
          <option value="sb">Sort: SB</option>
          <option value="h">Sort: Hits</option>
          <option value="ab">Sort: AB</option>
          <option value="gp">Sort: GP</option>
        </select>
      </div>

      <span class="stats-count" id="stats-count"></span>
    </div>

    <div class="table-wrap">
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th data-col="player_name">#&nbsp; Player</th>
              <th data-col="team">Team</th>
              <th data-col="gp"  class="th-num">GP</th>
              <th data-col="ab"  class="th-num">AB</th>
              <th data-col="h"   class="th-num">H</th>
              <th data-col="1b"  class="th-num">1B</th>
              <th data-col="2b"  class="th-num">2B</th>
              <th data-col="3b"  class="th-num">3B</th>
              <th data-col="hr"  class="th-num">HR</th>
              <th data-col="rbi" class="th-num">RBI</th>
              <th data-col="sb"  class="th-num">SB</th>
              <th data-col="avg" class="th-num">AVG</th>
              <th data-col="obp" class="th-num">OBP</th>
              <th data-col="slg" class="th-num">SLG</th>
              <th data-col="ops" class="th-num">OPS</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </div>
  </section>

</div><!-- /page-body -->

<script src="./shared.js?v=5"></script>
<script src="./header.js?v=5"></script>
<script>

const TEAM_COLORS = {
  "Renegades":  "#f5c542",
  "See Ya!":    "#4da3ff",
  "Hurricanes": "#3ee8d8",
  "Elite":      "#ff8080",
  "Legends":    "#c084fc",
  "Cut Fresh":  "#4cdb8a"
};

/* ── Helpers ── */
function fmt(v, digits = 3) {
  const n = Number(v || 0);
  return isNaN(n) ? "—" : n.toFixed(digits);
}
function fmtInt(v) {
  const n = Number(v || 0);
  return isNaN(n) ? "—" : String(n);
}
function getName(r) { return r.player_name || r.full_name || r.Name || "Unknown"; }
function getTeam(r) { return r.team || r.team_name || r.Team || ""; }

/* ── Leaderboard config ── */
const LB_CONFIG = [
  { key: "ops",  label: "OPS Leaders",       desc: "On-base + Slugging",       icon: "📈", fmt: v => fmt(v,3), higher: true },
  { key: "avg",  label: "Batting Average",    desc: "Hits / At Bats",           icon: "🎯", fmt: v => fmt(v,3), higher: true },
  { key: "obp",  label: "On-Base %",          desc: "Reaching base per PA",     icon: "👁️", fmt: v => fmt(v,3), higher: true },
  { key: "slg",  label: "Slugging %",         desc: "Total bases per AB",       icon: "⚡", fmt: v => fmt(v,3), higher: true },
  { key: "hr",   label: "Home Runs",          desc: "Balls over the fence",     icon: "💣", fmt: v => fmtInt(v), higher: true },
  { key: "1b",   label: "Singles",            desc: "One-base hits",            icon: "✅", fmt: v => fmtInt(v), higher: true },
  { key: "2b",   label: "Doubles",            desc: "Two-base hits",            icon: "🔥", fmt: v => fmtInt(v), higher: true },
  { key: "3b",   label: "Triples",            desc: "Three-base hits",          icon: "⚡", fmt: v => fmtInt(v), higher: true },
  { key: "rbi",  label: "Runs Batted In",     desc: "RBI this season",          icon: "🏠", fmt: v => fmtInt(v), higher: true },
  { key: "sb",   label: "Stolen Bases",       desc: "Speed on the base paths",  icon: "💨", fmt: v => fmtInt(v), higher: true },
  { key: "h",    label: "Hits",               desc: "Total base hits",          icon: "🏏", fmt: v => fmtInt(v), higher: true },
  { key: "ab",   label: "At Bats",            desc: "Plate appearances",        icon: "📋", fmt: v => fmtInt(v), higher: true },
  { key: "gp",   label: "Games Played",       desc: "Appearances this season",  icon: "📅", fmt: v => fmtInt(v), higher: true },
];

function buildLeaderboardCards(stats) {
  const container = document.getElementById("lb-cards");

  container.innerHTML = LB_CONFIG.map((cfg, i) => {
    const sorted = [...stats]
      .filter(r => Number(r[cfg.key] || 0) > 0)
      .sort((a, b) => Number(b[cfg.key] || 0) - Number(a[cfg.key] || 0))
      .slice(0, 10);

    const rows = sorted.map((r, idx) => {
      const team  = getTeam(r);
      const color = TEAM_COLORS[team] || "rgba(255,255,255,0.2)";
      return `
        <li class="lb-row">
          <div class="lb-rank">${idx + 1}</div>
          <div class="lb-player-info">
            <div class="lb-player-name">${getName(r)}</div>
            <div class="lb-player-team">
              <span class="lb-team-dot" style="background:${color};"></span>
              ${team}
            </div>
          </div>
          <div class="lb-stat-value">${cfg.fmt(r[cfg.key])}</div>
        </li>`;
    }).join("") || `<li style="padding:20px 24px;color:rgba(184,196,218,0.35);font-size:0.88rem;">No data yet.</li>`;

    return `
      <div class="lb-card${i === 0 ? " active" : ""}" data-lb="${cfg.key}">
        <div class="lb-card-header">
          <div class="lb-card-title">
            <div class="lb-icon">${cfg.icon}</div>
            <div>
              <h3>${cfg.label}</h3>
              <small>${cfg.desc}</small>
            </div>
          </div>
          <button class="lb-see-all" data-sort="${cfg.key}">See full table ↓</button>
        </div>
        <ol class="lb-list">${rows}</ol>
      </div>`;
  }).join("");

  /* Tab switching */
  document.getElementById("lb-tabs").addEventListener("click", e => {
    const tab = e.target.closest(".lb-tab");
    if (!tab) return;
    const key = tab.dataset.lb;
    document.querySelectorAll(".lb-tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".lb-card").forEach(c => c.classList.remove("active"));
    tab.classList.add("active");
    container.querySelector(`.lb-card[data-lb="${key}"]`).classList.add("active");
  });

  /* "See full table" scroll */
  container.addEventListener("click", e => {
    const btn = e.target.closest(".lb-see-all");
    if (!btn) return;
    document.getElementById("sort").value = btn.dataset.sort;
    document.getElementById("sort").dispatchEvent(new Event("change"));
    document.querySelector(".stats-section").scrollIntoView({ behavior: "smooth", block: "start" });
  });
}

/* ── Full stats table ── */
let currentSortCol = "ops";

function renderTable(stats, query, sortCol) {
  currentSortCol = sortCol;
  const q = (query || "").trim().toLowerCase();

  const filtered = stats.filter(r =>
    !q || getName(r).toLowerCase().includes(q) || getTeam(r).toLowerCase().includes(q)
  ).sort((a, b) => Number(b[sortCol] || 0) - Number(a[sortCol] || 0));

  document.getElementById("stats-count").textContent =
    `${filtered.length} player${filtered.length === 1 ? "" : "s"}`;

  document.querySelectorAll("thead th").forEach(th =>
    th.classList.toggle("sort-active", th.dataset.col === sortCol)
  );

  const medals = ["rank-gold","rank-silver","rank-bronze"];

  document.getElementById("rows").innerHTML = filtered.map((r, i) => {
    const team  = getTeam(r);
    const color = TEAM_COLORS[team] || "rgba(255,255,255,0.2)";
    const rankCls = i < 3 ? medals[i] : "";
    const rankVal = i < 3 ? ["🥇","🥈","🥉"][i] : i + 1;
    const singles = r["1b"] != null ? r["1b"] : Math.max(0,(r.h||0)-(r["2b"]||0)-(r["3b"]||0)-(r.hr||0));

    return `
      <tr>
        <td>
          <div class="td-player">
            <span class="td-player-rank ${rankCls}">${rankVal}</span>
            <span class="td-player-name">${getName(r)}</span>
          </div>
        </td>
        <td>
          <div class="td-team-cell">
            <div class="td-team-bar" style="background:${color};box-shadow:0 0 6px ${color}50;"></div>
            <span class="td-team-name">${team}</span>
          </div>
        </td>
        <td class="td-num">${fmtInt(r.gp)}</td>
        <td class="td-num">${fmtInt(r.ab)}</td>
        <td class="td-num">${fmtInt(r.h)}</td>
        <td class="td-num">${fmtInt(singles)}</td>
        <td class="td-num">${fmtInt(r["2b"])}</td>
        <td class="td-num">${fmtInt(r["3b"])}</td>
        <td class="td-num">${fmtInt(r.hr)}</td>
        <td class="td-num">${fmtInt(r.rbi)}</td>
        <td class="td-num">${fmtInt(r.sb)}</td>
        <td class="td-avg">${fmt(r.avg)}</td>
        <td class="td-avg">${fmt(r.obp)}</td>
        <td class="td-avg">${fmt(r.slg)}</td>
        <td class="td-avg">${fmt(r.ops)}</td>
      </tr>`;
  }).join("") || `<tr><td colspan="15" style="padding:32px;text-align:center;color:rgba(184,196,218,0.35);font-size:0.9rem;">No players found.</td></tr>`;
}

/* ── Init ── */
async function init() {
  const stats = await loadData("Web_Player_Stats");

  if (!Array.isArray(stats) || !stats.length) {
    document.getElementById("rows").innerHTML =
      `<tr><td colspan="15" style="padding:32px;text-align:center;color:rgba(184,196,218,0.35);">No stats available yet.</td></tr>`;
    return;
  }

  stats.forEach(r => {
    if (r["1b"] == null) {
      r["1b"] = Math.max(0, (Number(r.h)||0)-(Number(r["2b"])||0)-(Number(r["3b"])||0)-(Number(r.hr)||0));
    }
  });

  buildLeaderboardCards(stats);

  const searchEl = document.getElementById("search");
  const sortEl   = document.getElementById("sort");

  renderTable(stats, "", "ops");

  searchEl.addEventListener("input",  () => renderTable(stats, searchEl.value, currentSortCol));
  sortEl.addEventListener("change",   () => renderTable(stats, searchEl.value, sortEl.value));

  document.querySelectorAll("thead th[data-col]").forEach(th => {
    th.addEventListener("click", () => {
      const col = th.dataset.col;
      sortEl.value = col;
      renderTable(stats, searchEl.value, col);
    });
  });
}

init().catch(err => {
  document.getElementById("rows").innerHTML =
    `<tr><td colspan="15" style="padding:32px;text-align:center;color:rgba(184,196,218,0.35);">Error loading stats: ${err.message}</td></tr>`;
});
</script>

</body>
</html>
