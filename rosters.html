<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>League Rosters | Baseball For Bums</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./app.css?v=5">

  <style>
    body { font-family: 'Barlow', sans-serif; }

    /* ---- PAGE HEADER ---- */
    header {
      padding: 40px 0 20px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 28px;
      position: relative;
    }

    header::before {
      content: "";
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 80px;
      height: 2px;
      background: var(--accent);
      border-radius: 999px;
    }

    header h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: clamp(2.4rem, 5vw, 3.6rem);
      letter-spacing: -0.02em;
      margin: 0 0 6px;
      background: linear-gradient(135deg, #eef4ff 30%, #ffcc66 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: var(--muted);
      margin: 0;
      font-size: 1rem;
    }

    /* ---- SHELL ---- */
    .rosters-shell { display: grid; gap: 22px; }

    /* ---- TOP BAR ---- */
    .rosters-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .rosters-summary {
      color: var(--muted);
      font-size: 0.96rem;
    }

    /* ---- SEARCH ---- */
    .rosters-search {
      width: min(100%, 360px);
      position: relative;
    }

    .rosters-search input {
      width: 100%;
      min-height: 46px;
      padding: 0 16px 0 42px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.09);
      background: rgba(17,26,43,0.92);
      color: var(--text);
      outline: none;
      font: inherit;
      font-size: 0.9rem;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .rosters-search input:focus {
      border-color: rgba(214,64,69,0.45);
      box-shadow: 0 0 0 3px rgba(214,64,69,0.1);
    }

    .rosters-search input::placeholder { color: var(--muted); }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      font-size: 0.9rem;
    }

    /* ---- JUMP BAR ---- */
    .team-jumpbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .jump-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 0 14px;
      border-radius: 999px;
      text-decoration: none;
      color: var(--muted);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      transition: 0.15s ease;
    }

    .jump-link:hover {
      color: var(--text);
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.16);
      transform: translateY(-1px);
    }

    /* ---- ROSTER GRID ---- */
    .roster-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 20px;
    }

    /* ---- ROSTER CARD ---- */
    .roster-card {
      background: rgba(15,22,38,0.9);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
      overflow: hidden;
      scroll-margin-top: 120px;
      animation: cardIn 0.4s ease both;
    }

    .roster-card:nth-child(1) { animation-delay: 0.05s; }
    .roster-card:nth-child(2) { animation-delay: 0.1s; }
    .roster-card:nth-child(3) { animation-delay: 0.15s; }
    .roster-card:nth-child(4) { animation-delay: 0.2s; }
    .roster-card:nth-child(5) { animation-delay: 0.25s; }
    .roster-card:nth-child(6) { animation-delay: 0.3s; }

    /* ---- CARD HEADER ---- */
    .roster-card-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 20px 22px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.02);
    }

    .team-accent-bar {
      width: 4px;
      height: 40px;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--accent) 0%, rgba(214,64,69,0.3) 100%);
      flex-shrink: 0;
    }

    .roster-card-title {
      flex: 1;
      min-width: 0;
    }

    .roster-card-title h2 {
      margin: 0 0 3px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.35rem;
      font-weight: 800;
      letter-spacing: 0.01em;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .roster-card-title p {
      margin: 0;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .roster-count-badge {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      padding: 4px 12px;
      border-radius: 999px;
      background: rgba(214,64,69,0.12);
      border: 1px solid rgba(214,64,69,0.25);
      color: #ffb3b5;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* ---- PLAYER LIST ---- */
    .roster-list {
      list-style: none;
      margin: 0;
      padding: 12px;
      display: grid;
      gap: 8px;
    }

    .roster-player {
      display: grid;
      grid-template-columns: 40px minmax(0, 1fr);
      gap: 12px;
      align-items: center;
      padding: 13px 14px;
      border-radius: 12px;
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.05);
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    .roster-player:hover {
      background: rgba(255,255,255,0.045);
      border-color: rgba(255,255,255,0.1);
    }

    .roster-player.highlight {
      background: rgba(214,64,69,0.08);
      border-color: rgba(214,64,69,0.25);
    }

    .player-number {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--accent-2);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .player-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: var(--text);
      line-height: 1.2;
    }

    .player-name mark {
      background: rgba(255,204,102,0.25);
      color: var(--accent-2);
      border-radius: 3px;
      padding: 0 2px;
    }

    /* ---- EMPTY / ERROR / LOADING ---- */
    .empty-state-card,
    .loading-state {
      padding: 32px;
      border-radius: 20px;
      background: rgba(15,22,38,0.9);
      border: 1px solid rgba(255,255,255,0.07);
      color: var(--muted);
      font-size: 0.95rem;
    }

    /* ---- ANIMATIONS ---- */
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ---- RESPONSIVE ---- */
    @media (max-width: 900px) {
      .roster-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      .rosters-topbar { align-items: stretch; }
      .rosters-search { width: 100%; }

      .roster-card-header {
        padding: 16px 18px;
        flex-wrap: wrap;
      }

      .roster-player {
        grid-template-columns: 36px minmax(0, 1fr);
        padding: 11px 12px;
      }

      .player-number {
        width: 36px;
        height: 36px;
        border-radius: 8px;
      }
    }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <header>
    <div style="width:min(1140px,calc(100% - 32px));margin:0 auto;">
      <h1>League Rosters</h1>
      <p>Team-by-team player listings for the current season.</p>
    </div>
  </header>

  <main style="width:min(1140px,calc(100% - 32px));margin:0 auto;">
    <div class="brand-bar">
      <div class="brand-chip">
        <span>Powered by</span>
        <img src="https://7095cda1.logo-46y.pages.dev/logo.svg" alt="Oneby.AI">
      </div>
    </div>

    <section class="rosters-shell">
      <div class="rosters-topbar">
        <div class="rosters-summary" id="rosters-summary">Loading rosters…</div>

        <label class="rosters-search" aria-label="Search rosters">
          <span class="search-icon" aria-hidden="true">⌕</span>
          <input
            type="search"
            id="roster-search"
            placeholder="Search team or player…"
            autocomplete="off"
          >
        </label>
      </div>

      <div class="team-jumpbar" id="team-jumpbar"></div>

      <div id="rosters-content" class="loading-state">Loading team rosters…</div>
    </section>
  </main>

  <footer style="width:min(1140px,calc(100% - 32px));margin:0 auto;">
    Baseball For Bums League Central
  </footer>

  <script src="./shared.js?v=5"></script>
  <script src="./header.js?v=5"></script>
  <script>
    function slugify(value) {
      return String(value || "")
        .toLowerCase()
        .trim()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");
    }

    function escapeHtml(str) {
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function highlightMatch(text, term) {
      if (!term) return escapeHtml(text);
      const safe = escapeHtml(text);
      const re = new RegExp(`(${term.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")})`, "gi");
      return safe.replace(re, "<mark>$1</mark>");
    }

    function normalizeRosterRows(rows) {
      if (!Array.isArray(rows)) return [];
      return rows.map(row => {
        if (!row || typeof row !== "object") return null;
        const teamName =
          row.team_name || row.Team || row.team || row["Team Name"] || "";
        const fullName =
          row.full_name || row.player_name || row["Player Name"] || row.Name ||
          [row.first_name || "", row.last_name || ""].join(" ").trim();
        if (!teamName || !fullName) return null;
        return {
          team_id:   row.team_id || slugify(teamName),
          team_name: teamName,
          full_name: fullName.trim()
        };
      }).filter(Boolean);
    }

    function groupRosters(rows) {
      const grouped = new Map();
      rows.forEach(player => {
        const key = player.team_id || slugify(player.team_name);
        if (!grouped.has(key)) {
          grouped.set(key, { team_id: key, team_name: player.team_name, players: [] });
        }
        grouped.get(key).players.push(player);
      });
      return Array.from(grouped.values())
        .map(team => ({
          ...team,
          players: team.players.sort((a, b) =>
            a.full_name.localeCompare(b.full_name, undefined, { sensitivity: "base" }))
        }))
        .sort((a, b) =>
          a.team_name.localeCompare(b.team_name, undefined, { sensitivity: "base" }));
    }

    function renderJumpbar(teams) {
      document.getElementById("team-jumpbar").innerHTML = teams.map(t =>
        `<a class="jump-link" href="#team-${t.team_id}">${escapeHtml(t.team_name)}</a>`
      ).join("");
    }

    function renderSummary(teams) {
      const total = teams.reduce((s, t) => s + t.players.length, 0);
      document.getElementById("rosters-summary").textContent =
        `${teams.length} team${teams.length === 1 ? "" : "s"} · ${total} player${total === 1 ? "" : "s"} listed`;
    }

    function renderRosters(teams, term = "") {
      const content = document.getElementById("rosters-content");

      if (!teams.length) {
        content.className = "";
        content.innerHTML = `<div class="empty-state-card">No results found${term ? ` for "${escapeHtml(term)}"` : ""}.</div>`;
        return;
      }

      content.className = "roster-grid";
      content.innerHTML = teams.map(team => `
        <article class="roster-card" id="team-${team.team_id}">
          <div class="roster-card-header">
            <div class="team-accent-bar"></div>
            <div class="roster-card-title">
              <h2>${highlightMatch(team.team_name, term)}</h2>
              <p>${team.players.length} player${team.players.length === 1 ? "" : "s"} on roster</p>
            </div>
            <span class="roster-count-badge">${team.players.length} Players</span>
          </div>

          <ol class="roster-list">
            ${team.players.map((player, i) => `
              <li class="roster-player${term && player.full_name.toLowerCase().includes(term.toLowerCase()) ? " highlight" : ""}">
                <div class="player-number">${i + 1}</div>
                <div class="player-name">${highlightMatch(player.full_name, term)}</div>
              </li>
            `).join("")}
          </ol>
        </article>
      `).join("");
    }

    function applySearch(allTeams, query) {
      const term = String(query || "").trim().toLowerCase();

      if (!term) {
        renderSummary(allTeams);
        renderJumpbar(allTeams);
        renderRosters(allTeams);
        return;
      }

      const filtered = allTeams.map(team => {
        const teamMatch = team.team_name.toLowerCase().includes(term);
        const players   = team.players.filter(p => p.full_name.toLowerCase().includes(term));
        if (teamMatch) return team;
        if (!players.length) return null;
        return { ...team, players };
      }).filter(Boolean);

      renderSummary(filtered);
      renderJumpbar(filtered);
      renderRosters(filtered, query.trim());
    }

    async function initRostersPage() {
      const content = document.getElementById("rosters-content");
      try {
        const raw        = await loadData("Web_Rosters");
        const normalized = normalizeRosterRows(raw);
        const teams      = groupRosters(normalized);

        renderSummary(teams);
        renderJumpbar(teams);
        renderRosters(teams);

        document.getElementById("roster-search").addEventListener("input", e => {
          applySearch(teams, e.target.value);
        });
      } catch (err) {
        console.error(err);
        content.className = "";
        content.innerHTML = `<div class="empty-state-card">Unable to load rosters right now.</div>`;
        document.getElementById("rosters-summary").textContent = "Roster data temporarily unavailable";
      }
    }

    document.addEventListener("DOMContentLoaded", initRostersPage);
  </script>
</body>
</html>
